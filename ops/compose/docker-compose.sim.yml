# Tempo devnet SIMULATION stack: a one-shot provisioner, a trader fleet, plus the
# reuse services (keeper / market makers / liquidator / read API). This produces
# SYNTHETIC devnet activity so the UI has a live market — it is NOT organic volume.
#
# Two-step run (the market + mint are created at provision time):
#   1. cp .env.sim.example .env   # fill TEMPO_RPC_URL + master/agent keys under ./keys
#   2. docker compose -f docker-compose.sim.yml run --rm provision
#   3. read ./artifact/sim-artifact.json → put TEMPO_MARKET (+ TEMPO_COLLATERAL_MINT
#      for a money market) into .env
#   4. docker compose -f docker-compose.sim.yml up -d
#
# NEVER point this at mainnet — the devnet RPC belongs in .env.
name: tempo-sim

# context is the repo root. Coolify runs compose with --project-directory=<repo-root>,
# which resolves relative paths against the repo root (not this file's dir), so use `.`.
# For local runs, invoke from the repo root with: --project-directory "$(pwd)".
x-build: &build
  context: .
  dockerfile: ops/docker/Dockerfile

x-svc: &svc
  restart: unless-stopped
  env_file: [.env]
  volumes:
    - ./keys:/keys:ro
  networks: [tempo-sim]

services:
  # One-shot: create the market + money path, fund + init agents, write the artifact.
  provision:
    image: tempo/sim-provision:latest
    build:
      <<: *build
      args: { BIN: tempo-sim-provision }
    env_file: [.env]
    environment:
      TEMPO_SIM_KEYS_DIR: /keys
      TEMPO_SIM_ARTIFACT: /artifact/sim-artifact.json
    volumes:
      - ./keys:/keys
      - ./artifact:/artifact
    networks: [tempo-sim]
    restart: "no"

  keeper:
    <<: *svc
    image: tempo/keeper:latest
    build:
      <<: *build
      args: { BIN: tempo-keeper }
    environment:
      TEMPO_KEYPAIR: /keys/keeper.json
      TEMPO_HEALTH_ADDR: 0.0.0.0:8080

  liquidator:
    <<: *svc
    image: tempo/liquidator:latest
    build:
      <<: *build
      args: { BIN: tempo-liquidator }
    environment:
      TEMPO_KEYPAIR: /keys/liquidator.json
      TEMPO_HEALTH_ADDR: 0.0.0.0:8081

  mm-0:
    <<: *svc
    image: tempo/mm-bot:latest
    build:
      <<: *build
      args: { BIN: tempo-mm-bot }
    environment:
      TEMPO_KEYPAIR: /keys/mm-0.json
      TEMPO_HEALTH_ADDR: 0.0.0.0:8082

  mm-1:
    <<: *svc
    image: tempo/mm-bot:latest
    environment:
      TEMPO_KEYPAIR: /keys/mm-1.json
      TEMPO_HEALTH_ADDR: 0.0.0.0:8082

  # Trader fleet — one container per keypair/persona/seed. Scale by copying a block.
  trader-0:
    <<: *svc
    image: tempo/sim:latest
    build:
      <<: *build
      args: { BIN: tempo-sim }
    environment:
      TEMPO_KEYPAIR: /keys/trader-0.json
      TEMPO_SIM_PERSONA: noise
      TEMPO_SIM_SEED: "1"
      TEMPO_SIM_HEALTH_ADDR: 0.0.0.0:8083

  trader-1:
    <<: *svc
    image: tempo/sim:latest
    environment:
      TEMPO_KEYPAIR: /keys/trader-1.json
      TEMPO_SIM_PERSONA: momentum
      TEMPO_SIM_SEED: "2"
      TEMPO_SIM_HEALTH_ADDR: 0.0.0.0:8083

  trader-2:
    <<: *svc
    image: tempo/sim:latest
    environment:
      TEMPO_KEYPAIR: /keys/trader-2.json
      TEMPO_SIM_PERSONA: passive
      TEMPO_SIM_SEED: "3"
      TEMPO_SIM_HEALTH_ADDR: 0.0.0.0:8083

  trader-3:
    <<: *svc
    image: tempo/sim:latest
    environment:
      TEMPO_KEYPAIR: /keys/trader-3.json
      TEMPO_SIM_PERSONA: reckless
      TEMPO_SIM_SEED: "4"
      TEMPO_SIM_HEALTH_ADDR: 0.0.0.0:8083

  api:
    <<: *svc
    image: tempo/api:latest
    build:
      <<: *build
      args: { BIN: tempo-api }
    environment:
      TEMPO_API_BIND_ADDR: 0.0.0.0:8088
    ports:
      - "8088:8088"

networks:
  tempo-sim:
    driver: bridge
