# Tempo devnet SIMULATION stack — pulls a prebuilt image from GHCR (built by
# .github/workflows/sim.yml) and selects the binary per service via `command:`.
# Coolify only pulls + runs; it does NOT build. This produces SYNTHETIC devnet
# activity so the UI has a live market — it is NOT organic volume.
#
# First run:
#   1. cp .env.sim.example .env   # fill TEMPO_RPC_URL (paid devnet) + keys under ./keys
#   2. docker compose -f docker-compose.sim.yml run --rm provision
#   3. read ./artifact/sim-artifact.json → put TEMPO_MARKET (+ TEMPO_COLLATERAL_MINT
#      for a money market) into .env
#   4. docker compose -f docker-compose.sim.yml up -d
#
# The GHCR image is private by default — make the package public, or add GHCR pull
# credentials in Coolify, so the host can pull it. NEVER point this at mainnet.
name: tempo-sim

x-svc: &svc
  image: ghcr.io/trankhacvy/tempo:latest
  pull_policy: always
  restart: unless-stopped
  env_file: [.env]
  volumes:
    - ./keys:/keys:ro
  networks: [tempo-sim]

services:
  # One-shot: create the market + money path, fund + init agents, write the artifact.
  # Needs RW on ./keys (generates agent keypairs) and ./artifact.
  provision:
    <<: *svc
    command: [tempo-sim-provision]
    environment:
      TEMPO_SIM_KEYS_DIR: /keys
      TEMPO_SIM_ARTIFACT: /artifact/sim-artifact.json
    volumes:
      - ./keys:/keys
      - ./artifact:/artifact
    restart: "no"

  keeper:
    <<: *svc
    command: [tempo-keeper]
    environment:
      TEMPO_KEYPAIR: /keys/keeper.json
      TEMPO_HEALTH_ADDR: 0.0.0.0:8080

  liquidator:
    <<: *svc
    command: [tempo-liquidator]
    environment:
      TEMPO_KEYPAIR: /keys/liquidator.json
      TEMPO_HEALTH_ADDR: 0.0.0.0:8081

  mm-0:
    <<: *svc
    command: [tempo-mm-bot]
    environment:
      TEMPO_KEYPAIR: /keys/mm-0.json
      TEMPO_HEALTH_ADDR: 0.0.0.0:8082

  mm-1:
    <<: *svc
    command: [tempo-mm-bot]
    environment:
      TEMPO_KEYPAIR: /keys/mm-1.json
      TEMPO_HEALTH_ADDR: 0.0.0.0:8082

  # Trader fleet — one container per keypair/persona/seed. Scale by copying a block.
  trader-0:
    <<: *svc
    command: [tempo-sim]
    environment:
      TEMPO_KEYPAIR: /keys/trader-0.json
      TEMPO_SIM_PERSONA: noise
      TEMPO_SIM_SEED: "1"
      TEMPO_SIM_HEALTH_ADDR: 0.0.0.0:8083

  trader-1:
    <<: *svc
    command: [tempo-sim]
    environment:
      TEMPO_KEYPAIR: /keys/trader-1.json
      TEMPO_SIM_PERSONA: momentum
      TEMPO_SIM_SEED: "2"
      TEMPO_SIM_HEALTH_ADDR: 0.0.0.0:8083

  trader-2:
    <<: *svc
    command: [tempo-sim]
    environment:
      TEMPO_KEYPAIR: /keys/trader-2.json
      TEMPO_SIM_PERSONA: passive
      TEMPO_SIM_SEED: "3"
      TEMPO_SIM_HEALTH_ADDR: 0.0.0.0:8083

  trader-3:
    <<: *svc
    command: [tempo-sim]
    environment:
      TEMPO_KEYPAIR: /keys/trader-3.json
      TEMPO_SIM_PERSONA: reckless
      TEMPO_SIM_SEED: "4"
      TEMPO_SIM_HEALTH_ADDR: 0.0.0.0:8083

  api:
    <<: *svc
    command: [tempo-api]
    environment:
      TEMPO_API_BIND_ADDR: 0.0.0.0:8088
    ports:
      - "8088:8088"

networks:
  tempo-sim:
    driver: bridge
