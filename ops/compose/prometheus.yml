global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: keeper
    metrics_path: /metrics
    static_configs:
      - targets: ["keeper-a:8080", "keeper-b:8080"]

  - job_name: liquidator
    metrics_path: /metrics
    static_configs:
      - targets: ["liquidator-a:8081", "liquidator-b:8081"]

  - job_name: mm-bot
    metrics_path: /metrics
    static_configs:
      - targets: ["mm-bot:8082"]

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8088"]
