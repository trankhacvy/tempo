name: Sim image CI/CD

on:
  push:
    branches: [worktree-simulate, main]
    paths:
      - "crates/**"
      - "program/**"
      - "idl/**"
      - "ops/docker/**"
      - ".github/workflows/sim.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/tempo

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (all service binaries in one image)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/docker/Dockerfile.services
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build & push web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push web (NEXT_PUBLIC_* are build-time, from repo Variables)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}-web:latest
            ${{ env.IMAGE }}-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SOLANA_RPC_URL=${{ vars.NEXT_PUBLIC_SOLANA_RPC_URL }}
            NEXT_PUBLIC_TEMPO_MARKET=${{ vars.NEXT_PUBLIC_TEMPO_MARKET }}
            NEXT_PUBLIC_COLLATERAL_MINT=${{ vars.NEXT_PUBLIC_COLLATERAL_MINT }}
            NEXT_PUBLIC_VAULT_TOKEN_ACCOUNT=${{ vars.NEXT_PUBLIC_VAULT_TOKEN_ACCOUNT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Coolify deploy
    needs: [build, build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Ping Coolify webhook (pull + redeploy)
        env:
          WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_SIM }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::warning::COOLIFY_WEBHOOK_SIM not set; image pushed but deploy not triggered"
            exit 0
          fi
          curl --fail-with-body --silent --show-error \
            --request GET \
            --header "Authorization: Bearer $COOLIFY_TOKEN" \
            "$WEBHOOK_URL"
